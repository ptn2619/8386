<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

html,body{
height:100%;
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

canvas{
position:absolute;
width:100%;
height:100%;
transition:opacity 2s;
}

/* nút mở */

#openBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 50px;
font-size:26px;
background:#ff4da6;
color:white;
border-radius:40px;
cursor:pointer;
display:none;
box-shadow:0 0 25px #ff4da6;
}

/* khung lời chúc */

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
display:none;
box-shadow:0 0 30px pink;
}

/* hình ảnh */

.wish-img{
width:100%;
max-width:300px;
margin-top:20px;
border-radius:15px;
box-shadow:0 0 15px pink;
}

</style>
</head>

<body>

<canvas id="pinkboard"></canvas>

<div id="openBtn">MỞ</div>

<div id="message">

<h2>💐 Chúc mừng 8/3 💐</h2>

<p>
Chúc chị em phụ nữ luôn Louis Vuitton (luôn vui tươi),  
mãi xinh đẹp, khỏe khoắn và trẻ trung.  
Mong rằng mỗi ngày của chị em đều là 8/3,  
ngày nào cũng tươi mới, tỏa sáng và năng động, tinh nghịch.
</p>

<img src="https://i.pinimg.com/736x/cb/b9/ec/cbb9ec04c7f90857d2ffda62b89fbede.jpg" class="wish-img">

</div>

<script>

/* SETTINGS */

var settings={
particles:{
length:500,
duration:2,
velocity:100,
effect:-0.75,
size:30
}
};

/* POINT */

function Point(x,y){
this.x=x||0;
this.y=y||0;
}

Point.prototype.clone=function(){
return new Point(this.x,this.y);
};

Point.prototype.length=function(length){

if(length===undefined)
return Math.sqrt(this.x*this.x+this.y*this.y);

this.normalize();
this.x*=length;
this.y*=length;

return this;

};

Point.prototype.normalize=function(){

var length=this.length();

this.x/=length;
this.y/=length;

return this;

};

/* PARTICLE */

function Particle(){

this.position=new Point();
this.velocity=new Point();
this.acceleration=new Point();
this.age=0;

}

Particle.prototype.initialize=function(x,y,dx,dy){

this.position.x=x;
this.position.y=y;

this.velocity.x=dx;
this.velocity.y=dy;

this.acceleration.x=dx*settings.particles.effect;
this.acceleration.y=dy*settings.particles.effect;

this.age=0;

};

Particle.prototype.update=function(deltaTime){

this.position.x+=this.velocity.x*deltaTime;
this.position.y+=this.velocity.y*deltaTime;

this.velocity.x+=this.acceleration.x*deltaTime;
this.velocity.y+=this.acceleration.y*deltaTime;

this.age+=deltaTime;

};

Particle.prototype.draw=function(context,image){

function ease(t){
return (--t)*t*t+1;
}

var size=image.width*ease(this.age/settings.particles.duration);

context.globalAlpha=1-this.age/settings.particles.duration;

context.drawImage(
image,
this.position.x-size/2,
this.position.y-size/2,
size,
size
);

};

/* PARTICLE POOL */

function ParticlePool(length){

this.particles=new Array(length);

for(var i=0;i<length;i++)
this.particles[i]=new Particle();

this.firstActive=0;
this.firstFree=0;

}

ParticlePool.prototype.add=function(x,y,dx,dy){

this.particles[this.firstFree].initialize(x,y,dx,dy);

this.firstFree++;

if(this.firstFree==this.particles.length)
this.firstFree=0;

if(this.firstActive==this.firstFree)
this.firstActive++;

if(this.firstActive==this.particles.length)
this.firstActive=0;

};

ParticlePool.prototype.update=function(deltaTime){

var i;

if(this.firstActive<this.firstFree){

for(i=this.firstActive;i<this.firstFree;i++)
this.particles[i].update(deltaTime);

}

if(this.firstFree<this.firstActive){

for(i=this.firstActive;i<this.particles.length;i++)
this.particles[i].update(deltaTime);

for(i=0;i<this.firstFree;i++)
this.particles[i].update(deltaTime);

}

while(
this.particles[this.firstActive].age>=settings.particles.duration
&& this.firstActive!=this.firstFree
){

this.firstActive++;

if(this.firstActive==this.particles.length)
this.firstActive=0;

}

};

ParticlePool.prototype.draw=function(context,image){

var i;

if(this.firstActive<this.firstFree){

for(i=this.firstActive;i<this.firstFree;i++)
this.particles[i].draw(context,image);

}

if(this.firstFree<this.firstActive){

for(i=this.firstActive;i<this.particles.length;i++)
this.particles[i].draw(context,image);

for(i=0;i<this.firstFree;i++)
this.particles[i].draw(context,image);

}

};

/* MAIN */

(function(canvas){

var context=canvas.getContext('2d');

var particles=new ParticlePool(settings.particles.length);

var particleRate=settings.particles.length/settings.particles.duration;

var time;

function pointOnHeart(t){

return new Point(
160*Math.pow(Math.sin(t),3),
130*Math.cos(t)
-50*Math.cos(2*t)
-20*Math.cos(3*t)
-10*Math.cos(4*t)
+25
);

}

var image=(function(){

var canvas=document.createElement('canvas');
var context=canvas.getContext('2d');

canvas.width=settings.particles.size;
canvas.height=settings.particles.size;

function to(t){

var point=pointOnHeart(t);

point.x=settings.particles.size/2+point.x*settings.particles.size/350;
point.y=settings.particles.size/2-point.y*settings.particles.size/350;

return point;

}

context.beginPath();

var t=-Math.PI;
var point=to(t);

context.moveTo(point.x,point.y);

while(t<Math.PI){

t+=0.01;
point=to(t);
context.lineTo(point.x,point.y);

}

context.closePath();

context.fillStyle='#ea80b0';
context.fill();

var image=new Image();
image.src=canvas.toDataURL();

return image;

})();

function render(){

requestAnimationFrame(render);

var newTime=new Date().getTime()/1000;
var deltaTime=newTime-(time||newTime);

time=newTime;

context.clearRect(0,0,canvas.width,canvas.height);

var amount=particleRate*deltaTime;

for(var i=0;i<amount;i++){

var pos=pointOnHeart(Math.PI-2*Math.PI*Math.random());
var dir=pos.clone().length(settings.particles.velocity);

particles.add(
canvas.width/2+pos.x,
canvas.height/2-pos.y,
dir.x,
-dir.y
);

}

particles.update(deltaTime);
particles.draw(context,image);

}

function onResize(){

canvas.width=canvas.clientWidth;
canvas.height=canvas.clientHeight;

}

window.onresize=onResize;

setTimeout(function(){

onResize();
render();

},10);

})(document.getElementById('pinkboard'));

/* hiện nút mở */

setTimeout(function(){

document.getElementById("openBtn").style.display="block";

},4000);

/* bấm mở */

document.getElementById("openBtn").onclick=function(){

var canvas=document.getElementById("pinkboard");

canvas.style.opacity=0;

setTimeout(function(){

canvas.style.display="none";
document.getElementById("openBtn").style.display="none";
document.getElementById("message").style.display="block";

},2000);

};

</script>

</body>

</html>
